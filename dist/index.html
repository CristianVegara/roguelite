<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Roguelite</title>
    <!-- Design tokens must load first — all other stylesheets depend on them -->
    <script type="module" crossorigin src="/roguelite/assets/index-CjAmGyG_.js"></script>
    <link rel="stylesheet" crossorigin href="/roguelite/assets/index-BYB1uj8r.css">
  </head>
  <body>
    <!--
      #app — outermost shell, fills the full viewport.

      Layer stack (bottom to top):
        #canvas-mount   Phaser injects its canvas here
        #ui-layer       HTML overlay, pointer-events: none by default
          #screen-root  Active HTML screen (home, class-select, etc.)
          #hud-root     Combat HUD overlaid on the Phaser canvas
          #modal-root   Upgrade / relic / merchant / game-over modals
          #toast-root   Notifications, highest z-index
    -->
    <div id="app">

      <!-- Background image layer — sits beneath the canvas and every overlay.
           The actual background-image URL is injected at runtime by main.ts
           using import.meta.env.BASE_URL so the path is always correct
           regardless of which subpath the site is deployed to. -->
      <div id="canvas-bg"></div>

      <!-- Phaser canvas mount.
           Starts visible so Phaser scenes work during migration.
           Router adds is-hidden only once a real HTML screen is registered
           for the active route (Step M6+). -->
      <div id="canvas-mount"></div>

      <!-- HTML UI layer — overlaid on canvas, transparent by default -->
      <div id="ui-layer">

        <!-- Router mounts screens here -->
        <div id="screen-root"></div>

        <!-- Combat HUD overlaid on the arena — active only during a run -->
        <div id="hud-root"></div>

        <!-- Modals mount here, above screens -->
        <div id="modal-root"></div>

        <!-- Notifications — always on top -->
        <div id="toast-root"></div>

      </div><!-- /#ui-layer -->

    </div><!-- /#app -->

  </body>
</html>
